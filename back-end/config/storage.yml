test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

minio:
  service: S3
  access_key_id: <%= ENV['STORAGE_ACCESS_KEY'] %>
  secret_access_key: <%= ENV['STORAGE_SECRET_ACCESS_KEY'] %>
  region: <%= ENV['STORAGE_REGION'] %>
  bucket: <%= ENV['STORAGE_BUCKET'] %>
  endpoint: <%= ENV['STORAGE_ENDPOINT']%>
  force_path_style: true

# Cloudflare R2 (S3-compatible, free 10GB)
cloudflare:
  service: S3
  access_key_id: <%= ENV['R2_ACCESS_KEY_ID'] %>
  secret_access_key: <%= ENV['R2_SECRET_ACCESS_KEY'] %>
  region: auto
  bucket: <%= ENV['R2_BUCKET'] || 'niya-storage' %>
  endpoint: <%= ENV['R2_ENDPOINT'] %>
  force_path_style: true

# Use rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
# amazon:
#   service: S3
#   access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
#   secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
#   region: us-east-1
#   bucket: your_own_bucket

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket

# Azure Blob Storage configuration
microsoft:
  service: AzureStorage
  storage_account_name: <%= ENV['AZURE_STORAGE_ACCOUNT_NAME'] %>
  storage_access_key: <%= ENV['AZURE_STORAGE_ACCESS_KEY'] %>
  container: <%= ENV['AZURE_STORAGE_CONTAINER'] || 'niya-storage' %>

